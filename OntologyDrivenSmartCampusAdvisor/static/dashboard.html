<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本体推理仪表盘 · Ontology-Driven Smart Campus Advisor</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ===== Reset & Base ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-root:#1a1d2e;
  --bg-panel:#1e2235;
  --bg-panel-alt:#232740;
  --bg-card:#252845;
  --bg-card-hover:#2a2f52;
  --border:#2d3250;
  --border-bright:#3d4470;
  --text-primary:#e8eaf6;
  --text-secondary:#9ba3c2;
  --text-muted:#6b7394;
  --accent:#7c6af7;
  --accent-hover:#6a59e0;
  --accent-dim:rgba(124,106,247,.18);
  --accent-glow:rgba(124,106,247,.35);
  --green:#4ade80;
  --green-dim:rgba(74,222,128,.15);
  --orange:#fb923c;
  --orange-dim:rgba(251,146,60,.15);
  --red:#f87171;
  --red-dim:rgba(248,113,113,.15);
  --blue:#60a5fa;
  --blue-dim:rgba(96,165,250,.15);
  --purple:#c084fc;
  --purple-dim:rgba(192,132,252,.15);
  --yellow:#fbbf24;
  --yellow-dim:rgba(251,191,36,.15);
  --cyan:#22d3ee;
  --cyan-dim:rgba(34,211,238,.15);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Microsoft YaHei","PingFang SC",sans-serif;
  --font-mono:"SF Mono",Menlo,Consolas,"Courier New",monospace;
  --radius:10px;
  --radius-sm:6px;
  --shadow:0 4px 16px rgba(0,0,0,.4);
  --transition:all .2s ease;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);
  background:var(--bg-root);
  color:var(--text-primary);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* ===== Header ===== */
.header{
  background:linear-gradient(135deg,#1a1040,#2d1b69,#1a1040);
  border-bottom:1px solid var(--border-bright);
  padding:0 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:52px;
  flex-shrink:0;
  position:relative;
  z-index:100;
  box-shadow:0 2px 12px rgba(124,106,247,.2);
}
.header::before{
  content:"";
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,#7c6af7,transparent);
}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{
  width:32px;height:32px;
  background:linear-gradient(135deg,#7c6af7,#c084fc);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
  box-shadow:0 0 12px var(--accent-glow);
}
.header h1{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.header h1 span{color:var(--accent);margin-left:6px;font-weight:400;font-size:13px}
.header-subtitle{font-size:11px;color:var(--text-muted);margin-left:12px;padding-left:12px;border-left:1px solid var(--border)}
.header-right{display:flex;align-items:center;gap:16px}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  border-radius:20px;
  padding:4px 12px;
  font-size:12px;
  color:var(--text-secondary);
}
.stat-chip .val{color:var(--accent);font-weight:700;font-size:13px}
.header-btns{display:flex;gap:6px}
.header-btn{
  font-size:12px;padding:5px 12px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  cursor:pointer;
  transition:var(--transition);
}
.header-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.header-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* ===== Main Layout ===== */
.main{flex:1;display:flex;overflow:hidden;min-height:0}

/* Left Sidebar */
.sidebar{
  width:288px;
  min-width:220px;
  max-width:380px;
  background:var(--bg-panel);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}

/* Resizer */
.sidebar-resizer{
  width:4px;cursor:col-resize;
  background:transparent;
  flex-shrink:0;
  position:relative;
  z-index:50;
  transition:background .15s;
}
.sidebar-resizer:hover,.sidebar-resizer.dragging{background:var(--accent)}

/* Right Content */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg-root)}

/* ===== Sidebar Panels ===== */
.sidebar-panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  flex-shrink:0;
}
.sidebar-panel-header{
  padding:10px 14px;
  background:var(--bg-panel-alt);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.sidebar-panel-header .sp-icon{font-size:13px}
.sidebar-panel-header .sp-title{font-size:12px;font-weight:700;color:var(--text-primary);flex:1;letter-spacing:.5px;text-transform:uppercase}
.sidebar-panel-header .sp-badge{
  font-size:10px;padding:2px 8px;
  background:var(--accent-dim);
  border:1px solid rgba(124,106,247,.3);
  border-radius:10px;
  color:var(--accent);
  font-weight:600;
}
.sp-body{flex:1;overflow-y:auto;padding:12px}
.sp-body::-webkit-scrollbar{width:4px}
.sp-body::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}
.sp-body::-webkit-scrollbar-track{background:transparent}

/* Pipeline Panel */
#pipelinePanel{height:42%;border-bottom:1px solid var(--border)}
#pipelinePanel .sp-body{padding:10px 12px}

/* Chat Panel */
#chatPanel{flex:1;border-bottom:1px solid var(--border);min-height:0}

/* ===== Pipeline ===== */
.pipeline-list{display:flex;flex-direction:column;gap:2px}
.pipe-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:9px 10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  transition:var(--transition);
  position:relative;
}
.pipe-item:hover{background:var(--bg-card-hover);border-color:var(--border-bright)}
.pipe-item.active{background:var(--accent-dim);border-color:var(--accent)}
.pipe-item.done{opacity:.75}
.pipe-connector{
  position:absolute;left:17px;top:100%;width:2px;
  background:var(--border-bright);
  height:2px;
}
.pipe-item:last-child .pipe-connector{display:none}
.pipe-dot{
  width:26px;height:26px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  flex-shrink:0;
  position:relative;
  z-index:1;
}
.pipe-dot.pending{background:var(--bg-card);border:2px solid var(--border-bright);color:var(--text-muted)}
.pipe-dot.running{background:var(--accent-dim);border:2px solid var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
.pipe-dot.done{background:var(--green-dim);border:2px solid var(--green);color:var(--green)}
.pipe-dot.fail{background:var(--red-dim);border:2px solid var(--red);color:var(--red)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 0 6px transparent}}
.pipe-info{flex:1;min-width:0}
.pipe-stage-name{font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pipe-meta{font-size:10.5px;color:var(--text-muted);display:flex;gap:8px;align-items:center}
.pipe-meta .tag{padding:1px 5px;border-radius:4px;font-size:10px;font-weight:600}
.pipe-meta .tag.ok{background:var(--green-dim);color:var(--green)}
.pipe-meta .tag.running{background:var(--accent-dim);color:var(--accent)}
.pipe-meta .tag.fail{background:var(--red-dim);color:var(--red)}
.pipe-time{font-size:10px;color:var(--text-muted);margin-left:auto;flex-shrink:0;font-family:var(--font-mono)}

/* ===== Chat ===== */
#chatBody{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:0}
#chatBody::-webkit-scrollbar{width:4px}
#chatBody::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}
.chat-msg{display:flex;flex-direction:column;gap:3px;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.chat-msg.user{align-items:flex-end}
.chat-msg.assistant{align-items:flex-start}
.chat-msg.system{align-items:center}
.chat-role{font-size:10px;color:var(--text-muted);padding:0 4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.chat-bubble{
  max-width:85%;
  padding:8px 12px;
  border-radius:var(--radius);
  font-size:12.5px;
  line-height:1.6;
  word-break:break-word;
}
.chat-msg.user .chat-bubble{
  background:linear-gradient(135deg,#7c6af7,#6a59e0);
  color:#fff;
  border-bottom-right-radius:3px;
}
.chat-msg.assistant .chat-bubble{
  background:var(--bg-card);
  border:1px solid var(--border);
  color:var(--text-primary);
  border-bottom-left-radius:3px;
}
.chat-msg.system .chat-bubble{
  background:transparent;
  color:var(--text-muted);
  font-size:11px;
  border:none;
  text-align:center;
}
.chat-msg.system .chat-bubble::before{content:"··· ";color:var(--accent)}
.chat-msg.system .chat-bubble::after{content:" ···";color:var(--accent)}
.chat-time{font-size:9.5px;color:var(--text-muted);padding:0 4px}

/* Thinking steps in chat */
.thinking-step{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  border-radius:var(--radius-sm);
  padding:7px 10px;
  margin-top:4px;
  font-size:11px;
  color:var(--text-secondary);
  display:flex;align-items:flex-start;gap:7px;
}
.thinking-step .ts-icon{color:var(--accent);flex-shrink:0;margin-top:1px}
.thinking-step .ts-text{color:var(--text-secondary)}
.thinking-step .ts-result{color:var(--green);font-weight:600;margin-top:3px}

/* Markdown 渲染样式 */
.chat-bubble h1,.chat-bubble h2,.chat-bubble h3,.chat-bubble h4{margin:8px 0 4px;color:var(--text-primary);font-weight:600}
.chat-bubble h1{font-size:15px}.chat-bubble h2{font-size:14px}.chat-bubble h3{font-size:13px}.chat-bubble h4{font-size:12px}
.chat-bubble p{margin:4px 0}
.chat-bubble ul,.chat-bubble ol{margin:6px 0;padding-left:20px}
.chat-bubble li{margin:3px 0}
.chat-bubble code{background:var(--bg-root);padding:2px 5px;border-radius:4px;font-size:11px;font-family:var(--font-mono);color:var(--accent)}
.chat-bubble pre{background:var(--bg-root);padding:8px;border-radius:6px;overflow-x:auto;margin:6px 0}
.chat-bubble pre code{background:none;padding:0;color:var(--text-primary)}
.chat-bubble table{border-collapse:collapse;margin:8px 0;width:100%}
.chat-bubble th,.chat-bubble td{border:1px solid var(--border);padding:5px 8px;text-align:left;font-size:11px}
.chat-bubble th{background:var(--bg-panel-alt);font-weight:600;color:var(--accent)}
.chat-bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;margin:6px 0;color:var(--text-secondary)}
.chat-bubble a{color:var(--accent);text-decoration:underline}
.chat-bubble a:hover{color:var(--accent-hover)}
.chat-bubble hr{border:none;border-top:1px solid var(--border);margin:10px 0}

/* Chat Input */
.chat-input-area{
  padding:10px 12px;
  background:var(--bg-panel-alt);
  border-top:1px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.chat-input-area input{
  flex:1;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:8px 12px;
  font-size:12.5px;
  color:var(--text-primary);
  font-family:var(--font);
  outline:none;
  transition:var(--transition);
}
.chat-input-area input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-dim)}
.chat-input-area input::placeholder{color:var(--text-muted)}
.chat-send-btn{
  width:34px;height:34px;
  background:linear-gradient(135deg,#7c6af7,#6a59e0);
  border:none;border-radius:var(--radius-sm);
  color:#fff;font-size:14px;
  cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:var(--transition);
  box-shadow:0 2px 8px rgba(124,106,247,.3);
}
.chat-send-btn:hover{background:linear-gradient(135deg,#6a59e0,#5a4bd0);transform:translateY(-1px);box-shadow:0 4px 12px rgba(124,106,247,.4)}
.chat-send-btn:active{transform:translateY(0)}

/* ===== Top Content: Graph ===== */
.graph-area{flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:1px solid var(--border);min-height:0}
.graph-toolbar{
  padding:8px 14px;
  background:var(--bg-panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.graph-toolbar-title{
  font-size:12px;font-weight:700;color:var(--text-secondary);
  display:flex;align-items:center;gap:6px;
  flex:1;
}
.graph-toolbar-title::before{
  content:"";
  width:3px;height:14px;
  background:linear-gradient(180deg,#7c6af7,#c084fc);
  border-radius:2px;
}
.graph-mode-btns{display:flex;gap:4px}
.mode-btn{
  font-size:11px;padding:4px 10px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  cursor:pointer;transition:var(--transition);
  font-weight:500;
}
.mode-btn:hover{border-color:var(--accent);color:var(--accent)}
.mode-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.graph-hops-nav{display:flex;align-items:center;gap:4px}
.hop-nav-btn{
  font-size:11px;padding:3px 8px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  cursor:pointer;transition:var(--transition);
}
.hop-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.hop-nav-btn:disabled{opacity:.35;cursor:not-allowed}
.hop-counter{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);min-width:44px;text-align:center}
.graph-area-inner{flex:1;display:flex;overflow:hidden;min-height:0;position:relative}
#graph-container{flex:1;position:relative;overflow:hidden}
#mynetwork{width:100%;height:100%;background:transparent}
.graph-status{
  position:absolute;top:8px;left:10px;
  background:rgba(30,34,53,.92);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:4px 10px;
  font-size:11px;color:var(--text-muted);
  backdrop-filter:blur(8px);
  z-index:10;
}
.graph-status b{color:var(--accent)}
.graph-legend{
  position:absolute;bottom:10px;left:10px;
  background:rgba(30,34,53,.92);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:8px 10px;
  font-size:10.5px;
  backdrop-filter:blur(8px);
  z-index:10;
  max-width:200px;
}
.graph-legend-title{font-weight:700;color:var(--text-secondary);margin-bottom:6px;font-size:11px;letter-spacing:.5px;text-transform:uppercase}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:3px;color:var(--text-secondary)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-line{width:18px;height:3px;border-radius:2px;flex-shrink:0}
.legend-tag{
  display:inline-block;padding:1px 5px;
  border-radius:3px;font-size:9.5px;font-weight:700;
  margin-left:4px;
}
#nodeInfo{
  position:absolute;top:8px;right:10px;
  background:rgba(30,34,53,.95);
  border:1px solid var(--border-bright);
  border-radius:var(--radius);
  padding:10px 12px;
  font-size:11.5px;
  backdrop-filter:blur(8px);
  z-index:10;
  max-width:240px;
  max-height:60%;
  overflow-y:auto;
  display:none;
}
#nodeInfo::-webkit-scrollbar{width:4px}
#nodeInfo::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}
#nodeInfo h3{font-size:12.5px;color:var(--text-primary);margin-bottom:6px;font-weight:700}
#nodeInfo .ni-type{display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;margin-bottom:7px;font-weight:700}
#nodeInfo .ni-row{font-size:11px;color:var(--text-secondary);margin-bottom:2px}
#nodeInfo .ni-row b{color:var(--text-primary)}

/* ===== Bottom Panels ===== */
.bottom-panels{display:flex;height:280px;flex-shrink:0;min-height:180px}
.bottom-panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  border-right:1px solid var(--border);
}
.bottom-panel:last-child{border-right:none}
.bottom-panel-header{
  padding:8px 14px;
  background:var(--bg-panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.bp-icon{font-size:12px}
.bp-title{font-size:12px;font-weight:700;color:var(--text-primary);flex:1;letter-spacing:.3px}
.bp-count{
  font-size:10px;padding:2px 8px;
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text-muted);
  font-weight:600;
}
.bp-body{flex:1;overflow-y:auto;padding:10px 12px;min-height:0}
.bp-body::-webkit-scrollbar{width:4px}
.bp-body::-webkit-scrollbar-thumb{background:var(--border-bright);border-radius:2px}

/* Plan Panel */
#planPanel{flex:1.2;min-width:260px}
.plan-step{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  margin-bottom:6px;
  overflow:hidden;
  transition:var(--transition);
}
.plan-step:hover{background:var(--bg-card-hover)}
.plan-step-header{
  padding:7px 10px;
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
}
.plan-step-num{
  width:20px;height:20px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;flex-shrink:0;
}
.plan-step.pass .plan-step-num{background:var(--green-dim);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.plan-step.fail .plan-step-num{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,.3)}
.plan-step.pending .plan-step-num{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(251,146,60,.3)}
.plan-step-name{font-size:12px;font-weight:600;color:var(--text-primary);flex:1;font-family:var(--font-mono)}
.plan-step-status{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:700}
.plan-step.pass .plan-step-status{background:var(--green-dim);color:var(--green)}
.plan-step.fail .plan-step-status{background:var(--red-dim);color:var(--red)}
.plan-step.pending .plan-step-status{background:var(--orange-dim);color:var(--orange)}
.plan-step-body{
  padding:0 10px 8px;
  border-top:1px solid var(--border);
  margin-top:0;
  max-height:0;
  overflow:hidden;
  transition:max-height .25s ease,padding .25s ease;
}
.plan-step.expanded .plan-step-body{max-height:120px;padding:6px 10px 8px}
.plan-step-detail{display:flex;gap:8px;margin-top:5px;font-size:10.5px}
.plan-step-detail-label{color:var(--text-muted);flex-shrink:0;font-weight:600;text-transform:uppercase;letter-spacing:.3px;padding-top:1px}
.plan-step-detail-value{color:var(--text-secondary)}
.plan-step-detail-value b{color:var(--text-primary)}

/* Evidence Panel */
#evidencePanel{flex:1;min-width:200px}
.evidence-block{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  margin-bottom:6px;
  overflow:hidden;
}
.evidence-block-header{
  padding:7px 10px;
  background:var(--bg-panel-alt);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;
  cursor:pointer;
  transition:var(--transition);
}
.evidence-block-header:hover{background:var(--bg-card-hover)}
.eb-rule-icon{
  width:20px;height:20px;
  background:var(--accent-dim);
  border:1px solid rgba(124,106,247,.3);
  border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--accent);flex-shrink:0;
}
.eb-rule-name{font-size:12px;font-weight:700;color:var(--text-primary);flex:1;font-family:var(--font-mono)}

.eb-hop-reason{font-size:10.5px;color:var(--text-muted);margin-top:1px}
.eb-conclusion{
  padding:6px 10px;

  font-weight:600;
}

.answer-card{
  background:var(--bg-card);
  border:1px solid var(--border);

  padding:12px;
  margin-top:8px;
}
.answer-label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.answer-text{font-size:13px;color:var(--text-primary);line-height:1.7}
.answer-text b{color:var(--accent)}

/* ===== Loading ===== */
.loading-overlay{
  position:absolute;inset:0;
  background:rgba(26,29,46,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:100;
  backdrop-filter:blur(4px);
}
.loading-spinner{
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.spinner-ring{
  width:40px;height:40px;
  border:3px solid var(--border-bright);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--text-muted)}

/* ===== Collapsible cards in sidebar ===== */
.collapsible{max-height:9999px;transition:max-height .3s ease,opacity .2s ease}
.collapsible.collapsed{max-height:0;opacity:0;overflow:hidden}

// ==================== SIDEBAR RESIZER ====================
function initSidebarResizer() {
  const resizer = document.getElementById('sidebarResizer');
  const sidebar = document.getElementById('sidebar');
  const main = document.querySelector('.main');
  let isDragging = false;

  resizer.addEventListener('mousedown', function(e) {
    isDragging = true;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    const rect = main.getBoundingClientRect();
    let newWidth = e.clientX - rect.left;
    const minW = 200;
    const maxW = 450;
    if (newWidth < minW) newWidth = minW;
    if (newWidth > maxW) newWidth = maxW;
    sidebar.style.width = newWidth + 'px';
    if (network) setTimeout(() => { try { network.redraw(); network.fit({animation:false}); } catch(e){} }, 0);
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if (network) setTimeout(() => { try { network.fit({animation:{duration:300}}); } catch(e){} }, 50);
    }
  });
}

  }));

    edges: { width: 1 },
    layout: { improvedLayout: true },
  };

  if (network) { network.destroy(); network = null; }
  nodeDataSet = data.nodes;
  edgeDataSet = data.edges;
  network = new vis.Network(container, data, options);

  network.on('click', function(params) {
    const info = document.getElementById('nodeInfo');
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];

function appendChat(msg) {
  const body = document.getElementById('chatBody');
  const div = document.createElement('div');
  div.className = `chat-msg ${msg.role}`;
  let html = '';
  if (msg.role === 'system') {
    html = `<span class="chat-bubble">${escapeHtml(msg.content)}</span>`;
  } else if (msg.role === 'user') {
    html = `<div class="chat-bubble">${escapeHtml(msg.content)}</div>`;
  } else {
    html = `<div class="chat-bubble">${formatAnswer(msg.content)}`;
    if (msg.thinking) {
      html += `<div class="thinking-step"><span class="ts-icon">💭</span><div><span class="ts-text">${escapeHtml(msg.thinking)}</span></div></div>`;
    }
    html += '</div>';
  }
  div.innerHTML = html;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
  return div;
}

function prevHop() {
  if (currentHopIndex > 0) jumpToHop(currentHopIndex - 1);
}
function nextHop() {
  if (currentHopIndex < allHops.length - 1) jumpToHop(currentHopIndex + 1);
}
function jumpToHop(idx) {
  currentHopIndex = idx;
  updateHopCounter();
  // Highlight hop in graph
  if (network) {
    const hop = allHops[idx];
    // Highlight the edge
    network.fit({ animation: { duration: 300 } });
  }
}
function showAllHops() {
  currentHopIndex = allHops.length - 1;
  updateHopCounter();
}
function updateHopCounter() {
  document.getElementById('hopCounter').textContent = `${currentHopIndex + 1}/${allHops.length}`;
  document.getElementById('btnPrevHop').disabled = currentHopIndex <= 0;
  document.getElementById('btnNextHop').disabled = currentHopIndex >= allHops.length - 1;
}
function toggleAutoPlay() {
  const btn = document.getElementById('btnAutoPlay');
  if (autoPlayTimer) {
    clearInterval(autoPlayTimer);
    autoPlayTimer = null;
    btn.textContent = '▶ 自动';
  } else {
    btn.textContent = '⏸ 暂停';
    autoPlayTimer = setInterval(() => {
      if (currentHopIndex >= allHops.length - 1) {
        currentHopIndex = -1;
      }
      jumpToHop(currentHopIndex + 1);
    }, 1500);
  }
}

// ==================== API DATA MAPPING ====================
/**
 * 将后端 /api/<scenario>/ask 的响应映射为各面板的入参格式。
 * 后端字段 → dashboard render 函数字段的桥梁。
 */
function mapApiResponseToPanels(data) {
  // rule_flow: 后端编排规则列表 → plan 面板需要的 {step,action,desc,preconditions,postconditions,status}
  const plan = (data.rule_flow || []).map((rf, i) => ({
    step: i + 1,
    action: rf.rule,
    desc: rf.chinese || rf.rule,
    preconditions: rf.depends_on || [],
    postconditions: [],  // 后端未返回，按 pass 处理
    status: 'pass',      // 规则已执行成功
  }));

  // reasoning: 后端推理块列表 → evidence 面板需要的 {rule, ruleLabel, conclusion, facts}
  const evidence = (data.reasoning || []).map(r => ({
    rule: r.rule,
    ruleLabel: r.rule_desc || '',
    conclusion: r.conclusion || '',
    facts: (r.hops || []).map(h => ({
      from: h.from_label || h.from,
      pred: h.predicate,
      to: h.to_label || h.to,
      reason: h.reason || '',
      status: h.passed !== false ? 'pass' : 'fail',
    })),
  }));

  // 聚合所有 hops 用于图谱导航
  const allHops = (data.reasoning || []).flatMap(r => r.hops || []);

  // subgraph: 后端直接返回 {nodes, edges}，与 MOCK_DATA.graphNodes/graphEdges 同结构
  return {
    pipeline: data.pipeline || [],
    plan,
    evidence,
    allHops,
    subgraph: data.subgraph || { nodes: [], edges: [] },
    answer: data.answer || '',
    answerNodes: data.answer_nodes || [],
  };
}

// ==================== DO ASK (SSE 流式推理) ====================
async function doAsk() {
  const input = document.getElementById('questionInput');
  const askBtn = document.getElementById('askBtn');
  const question = input.value.trim();
  if (!question || askBtn.disabled) return;
  askBtn.disabled = true;
  input.value = '';

  appendChat({ role: 'user', content: question });
  appendChat({ role: 'system', content: '正在调用意图识别模块进行推理...' });

  let fullAnswer = '';
  let responseBubble = null;

  try {
    const resp = await fetch(`/api/${currentScenario}/ask/stream?question=${encodeURIComponent(question)}`);

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: '网络错误' }));
      appendChat({ role: 'system', content: `推理出错: ${err.error || resp.status}` });
      return;
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6);
        if (!jsonStr) continue;

        try {
          const event = JSON.parse(jsonStr);

          if (event.type === 'done' || event.type === 'error') {
            if (event.type === 'error') {
              appendChat({ role: 'system', content: `推理出错: ${event.data?.message || '未知错误'}` });
            }
            break;
          }

          // 兼容多种事件格式，提取 delta/content
          const content = 
            event.data?.delta || 
            event.data?.content || 
            event.delta || 
            event.content || 
            '';
          
          if (content) {
            fullAnswer += content;
            if (!responseBubble) {
              responseBubble = appendChat({ role: 'assistant', content: '' }).querySelector('.chat-bubble');
            }
            const thinkingStep = responseBubble.querySelector('.thinking-step');
            responseBubble.innerHTML = formatAnswer(fullAnswer) + (thinkingStep ? thinkingStep.outerHTML : '');
            const chatBody = document.getElementById('chatBody');
            chatBody.scrollTop = chatBody.scrollHeight;
          }

          if (event.data?.tool_calls?.length) {
            const toolName = escapeHtml(event.data.tool_calls[0].name);
            if (!responseBubble) {
              responseBubble = appendChat({ role: 'assistant', content: '' }).querySelector('.chat-bubble');
            }
            if (!responseBubble.querySelector('.thinking-step')) {
              responseBubble.innerHTML += `<div class="thinking-step"><span class="ts-icon">💭</span><div><span class="ts-text">调用工具: ${toolName}</span></div></div>`;
              document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
            }
          }
        } catch (e) {}
      }
    }

    // 确保最终内容被正确显示
    if (fullAnswer) {
      responseBubble = responseBubble || appendChat({ role: 'assistant', content: '' }).querySelector('.chat-bubble');
      responseBubble.innerHTML = formatAnswer(fullAnswer);
    }
    showSubGraph();

  } catch (err) {
    appendChat({ role: 'system', content: `推理出错: ${err.message}` });
  } finally {
    askBtn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>

        ai_context: 同义词：MM凭证主子关联、库存凭证头行绑定、物料凭证明细挂载、Goods Movement Header-Item Linking。
        from: BO_PUR_RECE
        to: BO_PUR_RECE01
        from_columns: [XINGXIANGMU]
        to_columns: [id]
        cardinality: ONE_TO_MANY

        to_columns: [FACTORY_ID]
        cardinality: ONE_TO_ONE
      - name: pr_info_mdm_kcdd
        description: 采购申请明细行需指定具体的库存地点，以精确界定物料入库的物理仓位、库区归属及后续的仓储作业策略。
        ai_context: 处理明细时，库存地点必须与所属工厂联动校验，禁止跨工厂引用库位；若用户仅提供工厂未指定库位，应根据物料类型或默认收货规则智能推荐，并提示用户确认，避免入库时因库位缺失导致流程阻塞。

      - name: receipt_associated_po
        description: 该动作是仓储入库与采购履约衔接的核心操作，用于将实物到货信息（收货单/入库单）与上游采购订单（PO）建立精确的明细级绑定关系。系统依据关联结果自动核销PO对应行的“未交数量”，更新订单履约状态（如部分收货、已关闭），并触发后续质检、上架及三单匹配（PO-收货-发票）流程。关联时需校验物料编码、供应商、收货组织的一致性。
        ai_context: 同义词：收货单关联PO、入库单绑定采购订单、收货核销订单、GR-PO Matching。

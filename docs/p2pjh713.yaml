        description: 采购申请明细行需明确指定收货/执行工厂，以确定物料的交付地点、库存归属及对应的工厂级采购策略。
        ai_context: 创建或查询明细时，若用户未提供工厂信息，应主动追问或根据成本中心/物料默认值智能推荐；同一申请单内不同明细行可关联不同工厂，需支持按工厂分组展示与校验。
        from: BO_PLAN_PR_INFO
        to: BO_PLAN_MDM_GC
